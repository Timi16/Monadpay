name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run forge tests
        run: forge test --offline --gas-report

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install deps
        run: yarn install --frozen-lockfile
      - name: Test SDK
        run: yarn workspace @monadpay/sdk test
      - name: Build SDK
        run: yarn workspace @monadpay/sdk build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: monadpay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d monadpay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/monadpay
      MONAD_RPC_URL: ws://127.0.0.1:8547
      MONAD_CHAIN_ID: 31337
      ROUTER_CONTRACT_ADDRESS: 0x0000000000000000000000000000000000000001
      WEBHOOK_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install deps
        run: yarn install --frozen-lockfile
      - name: Generate Prisma client
        run: yarn workspace @monadpay/backend prisma generate
      - name: Run migrations
        run: yarn workspace @monadpay/backend prisma migrate deploy
      - name: Test backend
        run: yarn workspace @monadpay/backend test
